<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- A tag meta viewport garante que a página se adapte a telas de celulares -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas</title>
    <!-- Conectando nosso arquivo de pintura (CSS) ao esqueleto (HTML) -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ========================================== -->
    <!-- CABEÇALHO PRINCIPAL DA PÁGINA              -->
    <!-- ========================================== -->
    <header>
        <h1>Gerenciador de Tarefas</h1>
        <p>Seu sistema completo para organização pessoal.</p>
    </header>

    <!-- ========================================== -->
    <!-- ÁREA DE AUTENTICAÇÃO (LOGIN / CADASTRO)    -->
    <!-- ========================================== -->
    <section id="auth-section">
        <h2>Entrar no Sistema</h2>
        
        <!-- Formulário de Login -->
        <form id="form-login">
            <h3>Já tenho conta</h3>
            <input type="email" id="login-email" placeholder="Seu e-mail" required>
            <div class="senha-wrapper">
                <input type="password" id="login-senha" placeholder="Sua senha" required>
                <button type="button" class="btn-olho" onclick="toggleSenha('login-senha')">&#128065;</button>
            </div>
            <button type="submit">Entrar</button>
        </form>

        <br>

        <!-- Formulário de Cadastro -->
        <form id="form-cadastro">
            <h3>Criar nova conta</h3>
            <input type="text" id="cadastro-nome" placeholder="Seu nome" required>
            <input type="email" id="cadastro-email" placeholder="Seu e-mail" required>
            <div class="senha-wrapper">
                <input type="password" id="cadastro-senha" placeholder="Sua senha" required>
                <button type="button" class="btn-olho" onclick="toggleSenha('cadastro-senha')">&#128065;</button>
            </div>
            <button type="submit">Cadastrar</button>
        </form>
    </section>

    <hr>

    <!-- ========================================== -->
    <!-- ÁREA DE TAREFAS (Invisível até o login)    -->
    <!-- ========================================== -->
    <section id="tasks-section">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Minhas Tarefas</h2>
            <button id="btn-sair" style="background-color: #e74c3c; color: white;">Sair da Conta</button>
        </div>

        <!-- Formulário para CRIAR uma nova tarefa -->
        <form id="form-tarefa">
            <input type="text" id="tarefa-titulo" placeholder="Título da tarefa" required>
            <textarea id="tarefa-descricao" placeholder="Descrição da tarefa" required></textarea>
            <button type="submit">Adicionar Tarefa</button>
        </form>

        <br>

        <!-- Barra de PESQUISA -->
        <div>
            <input type="text" id="input-pesquisa" placeholder="Buscar tarefa...">
            <button id="btn-pesquisar">Buscar</button>
        </div>

        <br>

        <!-- LISTA onde as tarefas vão aparecer dinamicamente -->
        <ul id="lista-tarefas">
            <!-- O JavaScript vai injetar os <li> aqui dentro! -->
        </ul>
    </section>

    <!-- Conectando nosso arquivo de inteligência (JavaScript) -->
    <script src="script.js"></script>
</body>
</html>
