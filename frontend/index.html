<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ========================================== -->
    <!-- CABEÇALHO COM GRADIENTE E DARK MODE TOGGLE -->
    <!-- ========================================== -->
    <header>
        <div class="header-content">
            <div>
                <h1>Gerenciador de Tarefas</h1>
                <p>Seu sistema completo para organização pessoal.</p>
            </div>
            <button id="btn-dark-mode" class="btn-theme" title="Alternar tema">
                <i data-lucide="moon"></i>
            </button>
        </div>
    </header>

    <!-- ========================================== -->
    <!-- ÁREA DE AUTENTICAÇÃO (LOGIN / CADASTRO)    -->
    <!-- ========================================== -->
    <section id="auth-section">
        <h2>Entrar no Sistema</h2>

        <!-- Formulário de Login -->
        <form id="form-login">
            <h3>Já tenho conta</h3>
            <input type="email" id="login-email" placeholder="Seu e-mail" required>
            <div class="senha-wrapper">
                <input type="password" id="login-senha" placeholder="Sua senha" required>
                <button type="button" class="btn-olho" onclick="toggleSenha('login-senha')">
                    <i data-lucide="eye"></i>
                </button>
            </div>
            <button type="submit">
                <i data-lucide="log-in"></i> Entrar
            </button>
        </form>

        <hr>

        <!-- Formulário de Cadastro -->
        <form id="form-cadastro">
            <h3>Criar nova conta</h3>
            <input type="text" id="cadastro-nome" placeholder="Seu nome" required>
            <input type="email" id="cadastro-email" placeholder="Seu e-mail" required>
            <div class="senha-wrapper">
                <input type="password" id="cadastro-senha" placeholder="Sua senha" required>
                <button type="button" class="btn-olho" onclick="toggleSenha('cadastro-senha')">
                    <i data-lucide="eye"></i>
                </button>
            </div>
            <button type="submit">
                <i data-lucide="user-plus"></i> Cadastrar
            </button>
        </form>
    </section>

    <!-- ========================================== -->
    <!-- ÁREA DE TAREFAS (Invisível até o login)    -->
    <!-- ========================================== -->
    <section id="tasks-section">
        <div class="section-header">
            <h2>Minhas Tarefas</h2>
            <button id="btn-sair">
                <i data-lucide="log-out"></i> Sair
            </button>
        </div>

        <!-- Formulário para CRIAR uma nova tarefa -->
        <form id="form-tarefa">
            <input type="text" id="tarefa-titulo" placeholder="Título da tarefa" required>
            <textarea id="tarefa-descricao" placeholder="Descrição da tarefa" required></textarea>
            <button type="submit">
                <i data-lucide="plus-circle"></i> Adicionar Tarefa
            </button>
        </form>

        <br>

        <!-- Barra de PESQUISA -->
        <div class="search-row">
            <input type="text" id="input-pesquisa" placeholder="Buscar tarefa...">
            <button id="btn-pesquisar">
                <i data-lucide="search"></i>
            </button>
        </div>

        <!-- LISTA onde as tarefas vão aparecer dinamicamente -->
        <ul id="lista-tarefas">
            <!-- O JavaScript vai injetar os <li> aqui dentro! -->
        </ul>
    </section>

    <!-- Lucide Icons (CDN) -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <!-- Conectando nosso arquivo de inteligência (JavaScript) -->
    <script src="script.js"></script>
</body>
</html>
