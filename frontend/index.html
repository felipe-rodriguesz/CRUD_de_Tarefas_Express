<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        figma: {
                            dark: '#000000',
                            accent: '#E5FF7F',
                            bg: '#F0E8CA', 
                            gray: '#FFFFFF', 
                            red: '#FD7373',
                            redBg: '#FFAA9B',
                            yellow: '#FFDA55',
                            border: '#E3E3F2'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    },
                    borderRadius: {
                        'figma-card': '19px',
                        'figma-full': '41px'
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-figma-bg text-figma-dark min-h-screen font-sans">

    <!-- Container principal agora ocupa 100% da tela em vez de max-420px -->
    <main class="w-full min-h-screen flex flex-col relative">

        <!-- ========================================== -->
        <!-- ÁREA DE AUTENTICAÇÃO (LOGIN / CADASTRO)    -->
        <!-- ========================================== -->
        <section id="auth-section" class="flex-1 flex flex-col items-center pt-20 p-6 min-h-screen relative z-0">
            <!-- Fundo preto simulando o design do Figma -->
            <div class="absolute top-0 left-0 w-full h-[360px] bg-figma-dark -z-10 rounded-b-[40px] sm:rounded-b-[0px]"></div>

            <div class="w-full max-w-md flex flex-col gap-8">
                <!-- Header da página de Login -->
                <div class="text-center mb-4">
                    <h1 class="text-4xl font-bold text-white mb-2">Gerenciador de Tarefas</h1>
                    <p class="text-gray-400 font-medium">Faça login ou crie uma conta para continuar</p>
                </div>

                <!-- Formulário de Login -->
                <form id="form-login" class="flex flex-col gap-4 bg-figma-gray p-8 rounded-[24px] border border-figma-border shadow-sm">
                    <h3 class="text-xl font-bold text-figma-dark mb-2">Entrar</h3>
                    <input type="email" id="login-email" placeholder="Endereço de e-mail" required class="w-full px-5 py-4 rounded-figma-full border border-figma-border bg-figma-gray outline-none focus:border-figma-dark text-sm font-medium">
                    
                    <div class="relative">
                        <input type="password" id="login-senha" placeholder="Senha" required class="w-full px-5 py-4 rounded-figma-full border border-figma-border bg-figma-gray outline-none focus:border-figma-dark pr-12 text-sm font-medium">
                        <button type="button" class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-figma-dark" onclick="toggleSenha('login-senha')">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    <button type="submit" class="mt-2 w-full py-4 bg-figma-dark text-white rounded-figma-full font-bold flex justify-center items-center gap-2 hover:bg-opacity-90 transition-all text-[15px]">
                        <i data-lucide="log-in" class="w-5 h-5"></i> Entrar
                    </button>
                </form>

                <!-- Formulário de Cadastro -->
                <form id="form-cadastro" class="flex flex-col gap-4 bg-figma-gray/50 p-8 rounded-[24px] border border-transparent">
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest text-center mb-2">Ou Crie sua Conta</h3>
                    <input type="text" id="cadastro-nome" placeholder="Nome completo" required class="w-full px-5 py-4 rounded-figma-full border border-figma-border bg-figma-gray outline-none focus:border-figma-dark text-sm font-medium">
                    <input type="email" id="cadastro-email" placeholder="Endereço de e-mail" required class="w-full px-5 py-4 rounded-figma-full border border-figma-border bg-figma-gray outline-none focus:border-figma-dark text-sm font-medium">
                    
                    <div class="relative">
                        <input type="password" id="cadastro-senha" placeholder="Senha" required class="w-full px-5 py-4 rounded-figma-full border border-figma-border bg-figma-gray outline-none focus:border-figma-dark pr-12 text-sm font-medium">
                        <button type="button" class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-figma-dark" onclick="toggleSenha('cadastro-senha')">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    <button type="submit" class="w-full py-4 bg-transparent border-2 border-figma-dark text-figma-dark rounded-figma-full font-bold flex justify-center items-center gap-2 hover:bg-figma-dark hover:text-white transition-all text-[15px]">
                        <i data-lucide="user-plus" class="w-5 h-5"></i> Cadastrar
                    </button>
                </form>
            </div>
        </section>

        <!-- ========================================== -->
        <!-- ÁREA DE TAREFAS (Invisível até o login)    -->
        <!-- ========================================== -->
        <section id="tasks-section" class="hidden flex-col w-full min-h-screen pb-12 relative z-0">
            <!-- Fundo preto simulando o design do Figma -->
            <div class="absolute top-0 left-0 w-full h-[360px] bg-figma-dark -z-10 rounded-b-[40px] sm:rounded-b-[0px]"></div>
            
            <!-- HEADER DA PÁGINA FIXO NO TOPO PARA DESKTOP/MOBILE -->
            <header class="w-full bg-figma-dark/90 backdrop-blur-md sticky top-0 z-40 shadow-sm border-b border-white/10">
                <div class="container mx-auto max-w-7xl px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 sm:gap-8">
                    
                    <!-- Saudação e Botão Sair Mobile -->
                    <div class="flex justify-between items-center w-full sm:w-auto">
                        <div>
                            <h1 class="text-xl sm:text-2xl font-bold text-gray-400 leading-none mb-1">Olá,</h1>
                            <h2 class="text-2xl sm:text-3xl font-bold text-white leading-none" id="user-greeting">Carregando...</h2>
                        </div>
                        <button id="btn-sair" class="sm:hidden w-11 h-11 flex items-center justify-center rounded-full bg-white/10 text-white border border-white/20 hover:bg-white/20 transition-colors shadow-sm" title="Sair">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    <!-- Barra de Pesquisa -->
                    <div class="search-row relative w-full sm:flex-1 sm:max-w-md">
                        <input type="text" id="input-pesquisa" placeholder="Buscar tarefa..." class="w-full px-5 py-3 pl-[46px] rounded-figma-full border border-transparent bg-white outline-none focus:ring-2 focus:ring-figma-accent font-medium text-[16px] placeholder:text-gray-400 shadow-sm transition-all">
                        <button id="btn-pesquisar" class="absolute left-[16px] top-1/2 -translate-y-1/2 text-gray-400 hover:text-figma-dark transition-colors">
                            <i data-lucide="search" class="w-5 h-5"></i>
                        </button>
                    </div>

                    <!-- Botão Sair Desktop -->
                    <button class="hidden sm:flex items-center gap-2 px-6 py-3 rounded-full bg-white/10 text-white border border-white/20 hover:bg-white/20 transition-colors shadow-sm font-bold whitespace-nowrap" title="Sair" onclick="document.getElementById('btn-sair').click()">
                        <i data-lucide="log-out" class="w-5 h-5"></i> Sair
                    </button>
                </div>
            </header>

            <!-- CONTEÚDO PRINCIPAL: FORMULÁRIO + LISTA EM GRID -->
            <div class="container mx-auto max-w-7xl px-6 mt-8 flex flex-col lg:flex-row gap-8 items-start relative z-20">
                
                <!-- COLUNA ESQUERDA: Formulário para Adicionar -->
                <div class="w-full lg:w-[350px] lg:sticky lg:top-28 lg:shrink-0">
                    <form id="form-tarefa" class="flex flex-col gap-4 bg-white p-6 rounded-[24px] border border-figma-border shadow-sm">
                        <div class="flex items-center gap-2 mb-2 px-1">
                            <i data-lucide="plus-circle" class="w-5 h-5 text-figma-dark"></i>
                            <h3 class="text-[16px] font-bold text-figma-dark uppercase tracking-wider">Nova Tarefa</h3>
                        </div>
                        <input type="text" id="tarefa-titulo" placeholder="Título da tarefa..." required class="w-full px-4 py-3.5 rounded-xl border border-transparent bg-figma-bg outline-none focus:border-figma-border focus:bg-white font-semibold text-[16px] transition-all">
                        <textarea id="tarefa-descricao" placeholder="Descrição da tarefa..." required rows="3" class="w-full px-4 py-3.5 rounded-xl border border-transparent bg-figma-bg outline-none focus:border-figma-border focus:bg-white resize-none text-[15px] transition-all"></textarea>
                        <button type="submit" class="w-full py-4 mt-2 bg-figma-dark text-white rounded-xl font-bold flex justify-center items-center gap-2 hover:bg-opacity-90 transition-all text-[16px]">
                            <i data-lucide="plus" class="w-5 h-5"></i> Adicionar
                        </button>
                    </form>
                </div>

                <!-- COLUNA DIREITA: Lista de Tarefas -->
                <div class="w-full lg:flex-1 flex flex-col">
                    <!-- Título da Lista -->
                    <div class="flex justify-between items-center mb-6 px-1">
                        <h3 class="text-[24px] sm:text-[28px] font-bold text-white">Tarefas Recentes</h3>
                    </div>

                    <!-- LISTA onde as tarefas vão aparecer dinamicamente (Grid em telas maiores) -->
                    <ul id="lista-tarefas" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5 pb-10 w-full">
                        <!-- O JavaScript vai injetar os cards aqui dentro! -->
                    </ul>
                </div>

            </div>

        </section>

    </main>

    <!-- Lucide Icons (CDN) -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
